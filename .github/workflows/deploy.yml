name: Deploy to GitHub Pages

# main への push で Astro をビルドし、GitHub Pages へ公開する。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 公開は同時に 1 つ。実行中のデプロイはキャンセルしない。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # npm ci → astro build → dist を Pages 用 artifact としてアップロードまで行う。
      - name: Build Astro site
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
